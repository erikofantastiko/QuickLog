<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- QuickLog app icon. Maskable-safe: glyph sits in the inner safe zone so a
       circular/squircle mask never clips the "QL". -->
  <rect width="512" height="512" fill="#0c0c0e"/>
  <text x="256" y="256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="190" font-weight="700" fill="#e5484d"
        text-anchor="middle" dominant-baseline="central" letter-spacing="-6">QL</text>
</svg>
