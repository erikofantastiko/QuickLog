<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QuickLog — Trade Log & Sizer</title>
<link rel="stylesheet" href="./styles.css">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<script src="./vendor/html2canvas.min.js" defer></script>
</head>
<body>
<div id="page">

<div class="tl" id="tl-root">

<div class="mr">
  <button class="mb on" id="tab-size">Position Sizer</button>
  <button class="mb" id="tab-log">Trade Log</button>
</div>

<!-- ===================== SIZER ===================== -->
<div id="size-view">

  <div class="r2">
    <div class="fi">
      <label>Broker</label>
      <select id="brk">
        <option value="ftmo">FTMO (MT5 CFD)</option>
        <option value="breakout">Breakout (Crypto Perps)</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="fi">
      <label>Account Size</label>
      <select id="accPreset">
        <option value="10000">10,000</option>
        <option value="25000">25,000</option>
        <option value="50000">50,000</option>
        <option value="100000" selected>100,000</option>
        <option value="200000">200,000</option>
        <option value="custom">Custom…</option>
      </select>
    </div>
  </div>

  <div class="fi" id="accCustomWrap" style="display:none">
    <label>Custom Account Size</label>
    <input type="text" id="accCustom" placeholder="100000">
  </div>

  <div class="r2">
    <div class="fi">
      <label>Instrument</label>
      <select id="inst"></select>
    </div>
    <div class="fi">
      <label>Risk %</label>
      <select id="szRisk">
        <option value="0.10">0.10%</option>
        <option value="0.25" selected>0.25%</option>
        <option value="0.50">0.50%</option>
        <option value="1.00">1.00%</option>
        <option value="custom">Custom…</option>
      </select>
    </div>
  </div>

  <div class="fi" id="szRiskCustomWrap" style="display:none">
    <label>Custom Risk %</label>
    <input type="text" id="szRiskCustom" placeholder="0.33">
  </div>

  <div class="fi" id="cvWrap">
    <label>Contract Value <span id="cvHint" style="text-transform:none;letter-spacing:0;color:var(--tx3)">(per 1.0 price move, per lot)</span></label>
    <input type="text" id="cv" placeholder="1.0">
  </div>

  <div class="sp"></div>

  <div class="r2">
    <div class="fi">
      <label>Entry</label>
      <input type="text" id="szEntry" placeholder="1.08500" style="font-family:var(--mn);font-size:18px">
    </div>
    <div class="fi">
      <label>Stop Loss</label>
      <input type="text" id="szSL" placeholder="1.08200" style="font-family:var(--mn);font-size:18px">
    </div>
  </div>

  <div class="fi">
    <label>Take Profit <span style="text-transform:none;letter-spacing:0;color:var(--tx3)">(optional, for R:R)</span></label>
    <input type="text" id="szTP" placeholder="1.09500" style="font-family:var(--mn)">
  </div>

  <div class="sl">Result</div>
  <div class="sz-out" id="szOut"></div>

  <div class="ar" style="margin-bottom:16px">
    <button class="bt" id="chartToggle">Show Chart ▾</button>
  </div>

  <div id="chartWrap" style="display:none;margin-bottom:24px">
    <div class="fi" style="margin-bottom:12px">
      <label>Chart Feed <span style="text-transform:none;letter-spacing:0;color:var(--tx3)">(broker / futures — search inside chart too)</span></label>
      <div style="display:flex;gap:8px">
        <input type="text" id="feedInput" placeholder="e.g. OANDA:NAS100USD, CME_MINI:NQ1!, KRAKEN:BTCUSD" style="font-family:var(--mn);font-size:14px">
        <button class="bt" id="feedLoad" style="flex:0 0 auto;padding:12px 16px">Load</button>
      </div>
    </div>
    <div class="fi" style="margin-bottom:12px">
      <label>Twelve Data API key <span style="text-transform:none;letter-spacing:0;color:var(--tx3)">(FX / metals — real lines · stored locally only · <a href="https://twelvedata.com/pricing" target="_blank" rel="noopener" style="color:var(--tx3)">free key</a>)</span></label>
      <input type="password" id="tdKey" placeholder="Twelve Data API key (FX/Metalle)" autocomplete="off" style="font-family:var(--mn);font-size:14px">
    </div>
    <div style="position:relative">
      <div id="tvChart" style="height:360px;border-radius:12px;overflow:hidden;border:1px solid var(--bd)"></div>
      <div id="chartLevels"></div>
    </div>
    <div class="hint" style="margin-top:8px;margin-bottom:0">Default feed follows the selected instrument. Override above for futures (CME_MINI:NQ1! / ES1!) or another broker. You can also change symbol inside the chart directly. Read Entry / SL / TP off the chart, then type them above — levels are not auto-pulled.</div>
  </div>

  <div class="ar">
    <button class="bt bp" id="toLogBtn">Send to Trade Log →</button>
    <button class="bt" id="szExb">Copy Sizer PNG</button>
  </div>
</div>

<!-- ===================== LOG ===================== -->
<div id="log-view" style="display:none">

  <div class="mr" style="margin-bottom:20px">
    <button class="mb on" id="bl">Live</button>
    <button class="mb" id="bb">Backtest</button>
  </div>

  <div id="btf" style="display:none">
    <div class="r2" style="margin-bottom:20px">
      <div class="fi" style="margin-bottom:0">
        <label>BT-Session-ID</label>
        <input type="text" id="btId" placeholder="BT-2026-01-NDX">
      </div>
      <div class="fi" style="margin-bottom:0">
        <label>Pool</label>
        <input type="text" id="pl" placeholder="Jan 2023 – May 2026">
      </div>
    </div>
  </div>

  <div class="fi">
    <label>Asset</label>
    <input type="text" id="ast" placeholder="EUR/USD" style="font-size:20px;font-weight:600;padding:14px">
  </div>

  <div class="fi">
    <label>Direction</label>
    <div class="dr">
      <button class="db lo" id="blo">↑ Long</button>
      <button class="db" id="bsh">↓ Short</button>
    </div>
  </div>

  <div class="r2">
    <div class="fi">
      <label>Session</label>
      <select id="ses"><option>London</option><option>NY</option><option>Asia</option></select>
    </div>
    <div class="fi">
      <label>Risk %</label>
      <select id="rsk">
        <option value="0.10">0.10%</option><option value="0.25" selected>0.25%</option>
        <option value="0.50">0.50%</option><option value="1.00">1.00%</option>
        <option value="custom">Custom…</option>
      </select>
    </div>
  </div>

  <div class="fi" id="rskCustomWrap" style="display:none">
    <label>Custom Risk %</label>
    <input type="text" id="rskCustom" placeholder="0.33">
  </div>

  <div class="sp"></div>

  <div class="fi">
    <label>Entry</label>
    <input type="text" id="ent" placeholder="1.08500" style="font-family:var(--mn);font-size:18px">
  </div>

  <div class="r2">
    <div class="fi">
      <label>Stop Loss</label>
      <input type="text" id="slo" placeholder="1.08200" style="font-family:var(--mn)">
    </div>
    <div class="fi">
      <label>Take Profit</label>
      <input type="text" id="tpr" placeholder="1.09500" style="font-family:var(--mn)">
    </div>
  </div>

  <div class="fi">
    <label>Volume <span style="text-transform:none;letter-spacing:0;color:var(--tx3)">(lots / units)</span></label>
    <input type="text" id="vol" placeholder="0.00" style="font-family:var(--mn)">
  </div>

  <div class="sp"></div>

  <div class="fi">
    <label>Setup</label>
    <select id="stp">
      <option>Asia Range</option><option>Monday Model</option>
      <option>EBP H4</option><option>EBP H1</option>
      <option>H12 SFP</option><option>FVG Retracement</option>
      <option>MSB Entry</option><option>Turtle Soup</option>
      <option>H12/H4 OB</option><option>Breaker Block</option>
      <option>Other</option>
    </select>
  </div>

  <div class="fi">
    <label>Note</label>
    <input type="text" id="nte" placeholder="H1 FVG after sweep, DXY divergence...">
  </div>

  <div class="ar">
    <button class="bt bp" id="logTradeBtn">Log Trade</button>
  </div>

  <div class="ar">
    <button class="bt bp" id="cpb">Copy for Sheet</button>
    <button class="bt" id="exb">PNG for X</button>
  </div>

  <div class="sp"></div>
  <div class="sl">Preview</div>
  <div class="cd" id="prv"></div>

  <div class="sp"></div>
  <div class="sl">Logged Trades</div>
  <div id="tradeList"></div>
</div>

<div id="tst" class="tst"></div>
</div>

<script src="./app.js" defer></script>

</div>
</body>
</html>
